<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MF Advocacia - BI & Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card h3 { font-size: 0.9rem; color: #64748b; margin-bottom: 15px; text-transform: uppercase; }
        .big-number { font-size: 2.5rem; font-weight: 700; color: var(--primary); }
        .progress-bar { height: 10px; background: #e2e8f0; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); transition: 1.5s; width: 0%; }
        .chart-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-back { text-decoration: none; color: var(--primary); font-weight: 600; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>

    <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Voltar ao Sistema</a>

    <div class="header">
        <h1>Painel de BI - Estratégia 2026</h1>
        <p>Dados em tempo real do Supabase</p>
    </div>

    <div class="grid-stats">
        <div class="card">
            <h3>Previdenciário (Meta 150)</h3>
            <div class="big-number" id="num-prev">0</div>
            <div class="progress-bar"><div id="bar-prev" class="progress-fill"></div></div>
            <p id="label-prev">Calculando progresso...</p>
        </div>
        <div class="card">
            <h3>Corporativo (Meta 8)</h3>
            <div class="big-number" id="num-corp" style="color: #10b981;">0</div>
            <div class="progress-bar"><div id="bar-corp" class="progress-fill" style="background:#10b981"></div></div>
            <p id="label-corp">Calculando progresso...</p>
        </div>
        <div class="card">
            <h3>Faturamento Mensal</h3>
            <div class="big-number">R$ 12.450</div>
            <p style="color: #10b981;"><i class="fas fa-caret-up"></i> +12% em relação a Abril</p>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
        <div class="chart-container">
            <h3>Crescimento de Novos Contratos</h3>
            <canvas id="growthChart"></canvas>
        </div>
        <div class="chart-container">
            <h3>Distribuição por Área</h3>
            <canvas id="typeChart"></canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wysxikeddqxyqexgveuc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_cpoIBJKYPBPGBQ_KrhddxQ_IWwvjiJY';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadBI() {
            // Busca dados do Supabase
            const { count: cPrev } = await _supabase.from('processos').select('*', {count:'exact', head:true}).eq('tipo_acao','Previdenciário');
            const { count: cCorp } = await _supabase.from('processos').select('*', {count:'exact', head:true}).eq('tipo_acao','Corporativo');

            // Atualiza Números e Barras
            document.getElementById('num-prev').innerText = cPrev || 0;
            document.getElementById('num-corp').innerText = cCorp || 0;
            
            const percPrev = ((cPrev || 0) / 150 * 100);
            const percCorp = ((cCorp || 0) / 8 * 100);

            document.getElementById('bar-prev').style.width = percPrev + '%';
            document.getElementById('bar-corp').style.width = percCorp + '%';
            document.getElementById('label-prev').innerText = percPrev.toFixed(1) + '% da meta atingida';
            document.getElementById('label-corp').innerText = percCorp.toFixed(1) + '% da meta atingida';

            // Gráfico de Linha (Crescimento)
            new Chart(document.getElementById('growthChart'), {
                type: 'line',
                data: {
                    labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai'],
                    datasets: [{
                        label: 'Contratos',
                        data: [10, 22, 18, 30, cPrev + cCorp],
                        borderColor: '#2563eb',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(37, 99, 235, 0.1)'
                    }]
                }
            });

            // Gráfico de Pizza (Distribuição)
            new Chart(document.getElementById('typeChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Previdenciário', 'Corporativo', 'Trabalhista'],
                    datasets: [{
                        data: [cPrev, cCorp, 5],
                        backgroundColor: ['#2563eb', '#10b981', '#f59e0b']
                    }]
                }
            });
        }

        document.addEventListener('DOMContentLoaded', loadBI);
    </script>
</body>
</html>
